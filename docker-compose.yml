services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: api-rest-scalable
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-2006}
    ports:
      - "${PORT:-2006}:${PORT:-2006}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${PORT:-2006}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
